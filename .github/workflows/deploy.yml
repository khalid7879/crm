name: 🚀 Deploy to PROD Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 114.130.69.249
          port: 6072
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "✅ Connected to server"

            cd /var/www/html

            if [ ! -d "crm/.git" ]; then
              rm -rf crm
              git clone -b main git@github.com:khalid7879/crm.git crm
            else
              cd crm
              git pull origin main || git fetch --all && git reset --hard origin/main
            fi

            cd crm

            echo "✅ Latest code pulled"

            # === Add your build/deploy commands here ===
            # composer install --no-dev --optimize-autoloader
            # php artisan migrate --force
            # php artisan optimize:clear
            # systemctl restart nginx php-fpm
            # pm2 restart all   # if using Node.js


            # ────────────────────────────────────────────────
            #  Rebuild & restart only the app container
            #  (fastest option if docker-compose supports it)
            # ────────────────────────────────────────────────
            docker-compose build --no-cache app
            docker-compose up -d --force-recreate --no-deps app

            # Optional: also restart webserver if you changed nginx config
            # docker-compose up -d --force-recreate --no-deps webserver

            echo "🎉 Deployment completed successfully!"